
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: santos-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: santos-ui

    depends_on:
      - api

    environment:
      - API_URL=http://api:8000/ask

    ports:
      - "8501:8501"

    volumes:
      - .:/app

    restart: unless-stopped
